name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Preset assets are gitignored and regenerated (PLAN.md §5, §11) — every
  # job that compiles the utz-data-* crates needs them, so generate once and
  # pass them as an artifact.
  gen:
    name: Generate preset assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # TZBB release zips + the 460 MB GHS-POP zip and its decoded sidecar.
      # Fresh key each run (immutable caches), newest restored by prefix;
      # downloads revalidate via ETag so a hit costs one conditional GET.
      - name: Cache source data (TZBB + GHS-POP)
        uses: actions/cache@v4
        with:
          path: cache
          key: source-data-${{ github.run_id }}
          restore-keys: source-data-
      - run: ./scripts/gen-presets.sh
      - uses: actions/upload-artifact@v4
        with:
          name: preset-assets
          path: utz-data-*/data/*.utz

  test:
    name: Test (std)
    needs: gen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: preset-assets
      - run: cargo test --workspace
      # each preset alone (Finder::new() smoke test), then two together
      # (new() cfg'd out, lazy/zero-copy agreement)
      - run: cargo test -p utz --no-default-features --features std,tiny
      - run: cargo test -p utz --no-default-features --features core,tiny-static
      - run: cargo test -p utz --no-default-features --features std,compact
      - run: cargo test -p utz --no-default-features --features std,balanced
      - run: cargo test -p utz --no-default-features --features std,accurate
      - run: cargo test -p utz --no-default-features --features std,tiny,tiny-static
      # the C-backed zstd decoder feature is compile-checked separately
      # (workspace tests use the pure-Rust ruzstd backend)
      - run: cargo check -p utz --features std,custom,geom-varint,zstd-sys
      # cdylib per-build, not via crate-type — see utz-simplify/Cargo.toml
      - run: cargo rustc -p utz-simplify --release --target wasm32-unknown-unknown --crate-type cdylib

  no_std:
    name: Build (no_std, riscv32imac bare metal)
    needs: gen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: riscv32imac-unknown-none-elf
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: preset-assets
      # the headline (§9, §11): preset baked in, zero-copy from flash —
      # no alloc, no codec
      - run: cargo build -p utz --target riscv32imac-unknown-none-elf --no-default-features --features core,tiny-static
      # every compressed preset is no_std+alloc clean (pure-Rust decoders)
      - run: cargo build -p utz --target riscv32imac-unknown-none-elf --no-default-features --features alloc,tiny
      - run: cargo build -p utz --target riscv32imac-unknown-none-elf --no-default-features --features alloc,compact
      - run: cargo build -p utz --target riscv32imac-unknown-none-elf --no-default-features --features alloc,balanced
      - run: cargo build -p utz --target riscv32imac-unknown-none-elf --no-default-features --features alloc,accurate
      # bring-your-own-asset rungs: custom carries no decoder, so pick them
      # here — between the two lines all four geometry decoders build on
      # bare metal (presets only ever exercise geom-varint)
      - run: cargo build -p utz --target riscv32imac-unknown-none-elf --no-default-features --features core,custom,geom-image,geom-coarse
      - run: cargo build -p utz --target riscv32imac-unknown-none-elf --no-default-features --features alloc,custom,gzip,ruzstd,geom-varint,geom-fixed
      # the shared bench harness must stay no_std (the ESP32-S3 firmware uses it)
      - run: cargo build -p utz-bench-common --target riscv32imac-unknown-none-elf

  docs:
    name: Docs
    # PR gate only — on main the Pages workflow builds the docs (same
    # -D warnings) as part of the deploy, so don't build them twice
    if: github.event_name == 'pull_request'
    needs: gen
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: preset-assets
      - run: cargo doc --workspace --no-deps

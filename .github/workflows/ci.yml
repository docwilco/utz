name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (std)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace
      # the C-backed zstd decoder feature is compile-checked separately
      # (workspace tests use the pure-Rust ruzstd backend)
      - run: cargo check -p utz --features std,zstd-sys
      - run: cargo build -p utz-simplify --release --target wasm32-unknown-unknown

  no_std:
    name: Build (no_std, riscv32imac bare metal)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: riscv32imac-unknown-none-elf
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p utz --target riscv32imac-unknown-none-elf
      # the pure-Rust no_std+alloc codec features
      - run: cargo build -p utz --target riscv32imac-unknown-none-elf --features gzip,ruzstd
      # the shared bench harness must stay no_std (the ESP32-S3 firmware uses it)
      - run: cargo build -p utz-bench-common --target riscv32imac-unknown-none-elf

  docs:
    name: Docs
    # PR gate only — on main the Pages workflow builds the docs (same
    # -D warnings) as part of the deploy, so don't build them twice
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps

# Build the webdist viewer (static page + per-dataset binary blobs) and the
# API docs, and deploy them to GitHub Pages:
#   https://docwilco.github.io/utz/live/  — viewer
#   https://docwilco.github.io/utz/docs/  — rustdoc
# (root redirects to /live/). Requires Pages to be set to the
# "GitHub Actions" source in the repo settings.
name: Deploy viewer to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      # TZBB release zips + the 460 MB GHS-POP zip and its decoded sidecar.
      # Fresh key each run (immutable caches), newest restored by prefix;
      # downloads revalidate via ETag so a hit costs one conditional GET.
      - name: Cache source data (TZBB + GHS-POP)
        uses: actions/cache@v4
        with:
          path: cache
          key: source-data-${{ github.run_id }}
          restore-keys: source-data-
      - name: Build webdist (viewer + dataset blobs)
        run: cargo run --release -p utz-build --example visualize webdist
      - name: Build API docs
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps
      - name: Assemble site (viewer at /live, rustdoc at /docs)
        run: |
          mkdir -p site
          cp -r webdist site/live
          cp -r target/doc site/docs
          cat > site/index.html <<'EOF'
          <!DOCTYPE html><meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=live/">
          <title>uTZ</title>
          <p><a href="live/">uTZ live simplification viewer</a> · <a href="docs/utz/">API docs</a></p>
          EOF
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

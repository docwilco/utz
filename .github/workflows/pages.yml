# Build the webdist viewer (static page + per-dataset binary blobs) and the
# API docs, and deploy them to GitHub Pages:
#   https://docwilco.github.io/utz/live/  — viewer
#   https://docwilco.github.io/utz/docs/  — rustdoc
# (root is a small landing page linking both). Requires Pages to be set to
# the "GitHub Actions" source in the repo settings.
name: Deploy viewer to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      # TZBB release zips + the 460 MB GHS-POP zip and its decoded sidecar.
      # Fresh key each run (immutable caches), newest restored by prefix;
      # downloads revalidate via ETag so a hit costs one conditional GET.
      - name: Cache source data (TZBB + GHS-POP)
        uses: actions/cache@v4
        with:
          path: cache
          key: source-data-${{ github.run_id }}
          restore-keys: source-data-
      - name: Build webdist (viewer + dataset blobs)
        run: cargo run --release -p utz-build -- visualize webdist
      # rustdoc compiles the utz-data-* crates, whose assets are gitignored
      # and regenerated (§5, §11)
      - name: Generate preset assets
        run: ./scripts/gen-presets.sh
      - name: Build API docs
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps
      - name: Assemble site (viewer at /live, rustdoc at /docs)
        run: |
          mkdir -p site
          cp -r webdist site/live
          cp -r target/doc site/docs
          cat > site/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en"><head><meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>μTZ</title>
          <style>
            body { background: #0d1117; color: #e6edf3; font: 16px/1.6 system-ui, sans-serif;
                   max-width: 40rem; margin: 4rem auto; padding: 0 1rem; }
            a { color: #58a6ff; text-decoration: none; }
            a:hover { text-decoration: underline; }
            li { margin: 0.5rem 0; }
            .sub { color: #8b98a8; font-size: 14px; }
          </style></head><body>
          <h1>μTZ</h1>
          <p class="sub">Tiny, embeddable latitude/longitude → IANA timezone lookup for Rust.</p>
          <ul>
            <li><a href="live/">Live simplification viewer</a> — TZBB datasets, algorithms, ε,
                quantization, population weighting, and the coarse pre-filter grid, running the
                builder's own code in-browser</li>
            <li><a href="docs/utz/">API documentation</a> — rustdoc for the μTZ crates</li>
            <li><a href="https://github.com/docwilco/utz">Source on GitHub</a></li>
          </ul>
          </body></html>
          EOF
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

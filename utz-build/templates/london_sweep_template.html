<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Europe/London — RDP simplification sweep</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  html, body, #map { height: 100%; margin: 0; }
  #panel { position: absolute; top: 12px; right: 12px; z-index: 600; width: 236px;
    background: rgba(17,22,28,0.9); color: #e6edf3; border: 1px solid #2a3542; border-radius: 10px;
    padding: 12px 14px; font: 13px/1.4 system-ui, sans-serif; backdrop-filter: blur(6px); }
  #panel h2 { margin: 0 0 2px; font-size: 13px; letter-spacing: .01em; }
  #panel .sub { margin: 0 0 10px; font-size: 11px; color: #8b98a8; }
  .lv { display: flex; align-items: center; gap: 9px; padding: 3px 0; cursor: pointer; }
  .lv input { accent-color: #ffb454; width: 15px; height: 15px; flex: none; }
  .sw { width: 22px; height: 4px; border-radius: 2px; flex: none; }
  .lv .txt { font-variant-numeric: tabular-nums; }
  .lv .v { color: #8b98a8; font-size: 11px; margin-left: auto; font-variant-numeric: tabular-nums; }
  .qsec { margin-top: 10px; padding-top: 9px; border-top: 1px solid #2a3542; }
  .qtitle { font-size: 11px; letter-spacing: .04em; text-transform: uppercase; color: #b9c4d0; margin-bottom: 6px; }
  .qtitle span { color: #5a6472; text-transform: none; letter-spacing: 0; }
  .q { display: flex; align-items: center; gap: 8px; padding: 2px 0; cursor: pointer; }
  .q input { accent-color: #ffb454; }
  .q .qv { color: #8b98a8; font-size: 11px; margin-left: auto; font-variant-numeric: tabular-nums; }
  .qstep { margin-top: 6px; font-size: 11px; color: #ffb454; font-variant-numeric: tabular-nums; min-height: 14px; }
  #panel .foot { margin-top: 9px; padding-top: 8px; border-top: 1px solid #2a3542; font-size: 11px; color: #8b98a8; }
</style>
</head>
<body>
<div id="map"></div>
<div id="panel">
  <h2>Portugal / Spain tz border</h2>
  <p class="sub">WET (Europe/London, incl. Portugal) vs CET (Europe/Madrid) · toggle each RDP level</p>
  <div id="levels"></div>
  <div class="qsec">
    <div class="qtitle">Quantization <span>· RDP sets only</span></div>
    <div id="quants"></div>
    <div class="qstep" id="qstep"></div>
  </div>
  <div class="foot">outline only · coarser ε pulls the border off the frontier · quantization snaps every vertex to a grid (full stays f64)</div>
</div>
<script>
var LEVELS = /*DATA*/;

var map = L.map('map').setView([40.2, -6.9], 7);
// CARTO / Esri tiles — keyless and no Referer requirement (OSM's own tile server
// 403s from file:// because it demands a Referer header).
var streets = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 20, subdomains: 'abcd', attribution: '© OpenStreetMap © CARTO' }).addTo(map);
var sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19, attribution: 'Tiles © Esri' });
var carto = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20, subdomains: 'abcd', attribution: '© OpenStreetMap © CARTO' });
L.control.layers({ 'Streets': streets, 'Satellite': sat, 'Dark': carto }, {}, { position: 'bottomright' }).addTo(map);
L.control.scale({ position: 'bottomleft', metric: true, imperial: true, maxWidth: 180 }).addTo(map);

// ---- quantization grids (applied on the fly; matches the Rust schemes) ----
var Q = {
  f64: { label: 'f64 — none', step: 'exact', fn: function (v) { return v; } },
  f32: { label: 'f32', step: '≈ 1–2 m', fn: null /* per-axis below */ },
  i32: { label: 'i32 · deg×1e7', step: '≈ 1 cm', fn: null },
  i24: { label: 'i24 abs global', step: '2.4 m lon / 1.2 m lat', fn: null },
  i16: { label: 'i16 abs global', step: '611 m lon / 305 m lat', fn: null },
};
function qlon(v, m) {
  if (m === 'f64') return v;
  if (m === 'f32') return Math.fround(v);
  if (m === 'i32') return Math.round(v * 1e7) / 1e7;
  if (m === 'i24') return Math.round(v / 180 * 8388607) / 8388607 * 180;
  if (m === 'i16') return Math.round(v / 180 * 32767) / 32767 * 180;
  return v;
}
function qlat(v, m) {
  if (m === 'f64') return v;
  if (m === 'f32') return Math.fround(v);
  if (m === 'i32') return Math.round(v * 1e7) / 1e7;
  if (m === 'i24') return Math.round(v / 90 * 8388607) / 8388607 * 90;
  if (m === 'i16') return Math.round(v / 90 * 32767) / 32767 * 90;
  return v;
}
// deep-map a GeoJSON FeatureCollection's coordinates through the grid
function quantized(geo, mode) {
  return {
    type: 'FeatureCollection',
    features: geo.features.map(function (f) {
      return { type: 'Feature', properties: {}, geometry: {
        type: 'MultiPolygon',
        coordinates: f.geometry.coordinates.map(function (poly) {
          return poly.map(function (ring) {
            return ring.map(function (c) { return [qlon(c[0], mode), qlat(c[1], mode)]; });
          });
        })
      }};
    })
  };
}

function color(i, n) { var h = 140 - (i / Math.max(1, n - 1)) * 140; return 'hsl(' + h + ',75%,55%)'; }

var state = { quant: 'f64' };
var levels = [];               // { lv, layer, on, col }
var defaultsOn = { 0: true, 250: true, 1000: true };
var box = document.getElementById('levels');

function modeFor(lv) { return lv.eps === 0 ? 'f64' : state.quant; }  // full is NEVER quantized
function rebuild(rec) {
  rec.layer.clearLayers();
  rec.layer.addData(quantized(rec.lv.geojson, modeFor(rec.lv)));
}

LEVELS.forEach(function (lv, i) {
  var col = color(i, LEVELS.length);
  var layer = L.geoJSON(null, { style: { color: col, weight: 2, opacity: 0.95, fill: false } });
  var rec = { lv: lv, layer: layer, col: col, on: !!defaultsOn[lv.eps] };
  levels.push(rec);
  rebuild(rec);
  if (rec.on) layer.addTo(map);

  var row = document.createElement('label'); row.className = 'lv';
  var cb = document.createElement('input'); cb.type = 'checkbox'; cb.checked = rec.on;
  cb.addEventListener('change', function () { rec.on = cb.checked; if (cb.checked) layer.addTo(map); else map.removeLayer(layer); });
  var sw = document.createElement('span'); sw.className = 'sw'; sw.style.background = col;
  var txt = document.createElement('span'); txt.className = 'txt'; txt.textContent = lv.eps === 0 ? 'full (f64)' : 'ε = ' + lv.eps + ' m';
  var v = document.createElement('span'); v.className = 'v'; v.textContent = lv.verts.toLocaleString() + ' v';
  row.appendChild(cb); row.appendChild(sw); row.appendChild(txt); row.appendChild(v);
  box.appendChild(row);
});

// quantization radios
var qbox = document.getElementById('quants'), qstep = document.getElementById('qstep');
Object.keys(Q).forEach(function (k) {
  var row = document.createElement('label'); row.className = 'q';
  var r = document.createElement('input'); r.type = 'radio'; r.name = 'quant'; r.value = k; r.checked = (k === state.quant);
  r.addEventListener('change', function () {
    state.quant = k; qstep.textContent = Q[k].step === 'exact' ? '' : 'grid: ' + Q[k].step;
    // rebuild only the RDP sets (full is fixed f64)
    levels.forEach(function (rec) { if (rec.lv.eps !== 0) rebuild(rec); });
  });
  var t = document.createElement('span'); t.textContent = Q[k].label;
  row.appendChild(r); row.appendChild(t);
  qbox.appendChild(row);
});

// centered on the Portugal/Spain border (see setView above); no auto-fit —
// the WET feature spans UK→Canaries and would zoom out too far.
</script>
</body>
</html>

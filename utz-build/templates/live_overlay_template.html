<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>__TITLE__</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  html, body, #map { height: 100%; margin: 0; }
  #panel { position: absolute; top: 12px; right: 12px; z-index: 600; width: 344px;
    background: rgba(17,22,28,0.9); color: #e6edf3; border: 1px solid #2a3542; border-radius: 10px;
    padding: 12px 14px; font: 13px/1.4 system-ui, sans-serif; backdrop-filter: blur(6px); max-height: 92vh; overflow-y: auto; }
  #panel h2 { margin: 0 0 2px; font-size: 13px; }
  #panel .sub { margin: 0 0 10px; font-size: 11px; color: #8b98a8; }
  .qsec { margin-top: 10px; padding-top: 9px; border-top: 1px solid #2a3542; }
  .qtitle { font-size: 11px; letter-spacing: .04em; text-transform: uppercase; color: #b9c4d0; margin-bottom: 6px; }
  .qtitle span { color: #5a6472; text-transform: none; letter-spacing: 0; }
  .slot { display: flex; align-items: center; gap: 6px; padding: 3px 0; }
  .slot input[type=checkbox] { accent-color: #ffb454; width: 14px; height: 14px; flex: none; }
  .sw { width: 14px; height: 4px; border-radius: 2px; flex: none; }
  .slot select { background: #0d1117; color: #e6edf3; border: 1px solid #2a3542; border-radius: 5px;
    font: 11px system-ui, sans-serif; padding: 2px 3px; max-width: 86px; }
  .slot select:disabled { opacity: 0.4; }
  .slot .raw-label { font-size: 12px; }
  .slot .rawv { color: #8b98a8; font-size: 11px; margin-left: auto; font-variant-numeric: tabular-nums; }
  .spin { width: 11px; height: 11px; flex: none; border: 2px solid #2a3542; border-top-color: #ffb454;
    border-radius: 50%; animation: sp 0.8s linear infinite; visibility: hidden; }
  .spin.on { visibility: visible; }
  @keyframes sp { to { transform: rotate(360deg); } }
  .st { display: flex; align-items: center; gap: 8px; padding: 2px 0; font-size: 11px; font-variant-numeric: tabular-nums; }
  .st .num { margin-left: auto; color: #8b98a8; }
  .st .pct { color: #7ee787; }
  #panel .foot { margin-top: 9px; padding-top: 8px; border-top: 1px solid #2a3542; font-size: 11px; color: #8b98a8; }
</style>
</head>
<body>
<div id="map"></div>
<div id="panel">
  <h2>__TITLE__</h2>
  <p class="sub">__SUB__</p>
  <div class="qtitle">Sets <span>· algorithm / ε / quantization · pop-weight slider below each</span></div>
  <div id="slots"></div>
  <label class="slot" id="rawrow">
    <input type="checkbox" id="rawcb">
    <span class="sw" style="background:#00d95f"></span>
    <span class="raw-label">raw · f64 full-res</span>
    <span class="rawv" id="rawv"></span>
  </label>
  <div class="qsec" id="densec" style="display:none">
    <div class="qtitle">Population density <span>· GHS-POP 2020</span></div>
    <label class="slot">
      <input type="checkbox" id="heatcb">
      <span class="sw" style="background:linear-gradient(90deg,#0d3c78,#f5c81e,#ff2d2d)"></span>
      <span class="raw-label">heatmap</span>
      <input type="range" id="heatop" min="0" max="100" value="45" style="flex:1" title="heatmap opacity">
    </label>
  </div>
  <div class="qsec">
    <div class="qtitle">Reduction <span>· enabled sets</span></div>
    <div id="stats"></div>
  </div>
  <div class="qsec">
    <div class="qtitle">Misassigned <span>· vs raw ε=0, pre-quant</span></div>
    <div id="mstats"></div>
  </div>
</div>
<script>
var ARCS = /*ARCS*/;
var STORED0 = /*STORED0*/;   // full-res arc verts (the embedded baseline)
var WASM_B64 = "/*WASM*/";
// per-vertex population density (p/km², max of incident edges, arc order —
// same edge sampling the builder uses) and the coarse heat raster
// {w,h,lon0,lat0,dlon,dlat,b64}; both null when built without GHS-POP
var DENS = /*DENS*/;
var HEAT = /*HEAT*/;

var ALGO = [
  { id: 0, key: 'rdp', name: 'RDP' },
  { id: 1, key: 'vw', name: 'Visvalingam' },
  { id: 2, key: 'ii', name: 'Imai–Iri' },
  // id 255 hits utz_simplify's unknown-algo path: coords pass through
  // unchanged — quantization (and nothing else) applies
  { id: 255, key: 'raw', name: 'Raw' },
];
var EPS_M = [10, 25, 50, 100, 250, 500, 1000, 2000, 5000];
var QUANT = [
  { key: 'f64', label: 'f64', bpc: 8 },
  { key: 'f32', label: 'f32', bpc: 4 },
  { key: 'i32', label: 'i32', bpc: 4 },
  { key: 'i24', label: 'i24', bpc: 3 },
  { key: 'i16', label: 'i16', bpc: 2 },
];
function qc(v, m, span) {
  if (m === 'f64') return v;
  if (m === 'f32') return Math.fround(v);
  if (m === 'i32') return Math.round(v * 1e7) / 1e7;
  if (m === 'i24') return Math.round(v / span * 8388607) / 8388607 * span;
  if (m === 'i16') return Math.round(v / span * 32767) / 32767 * span;
  return v;
}
function fmtBytes(b) {
  return b >= 1048576 ? (b / 1048576).toFixed(1) + ' MiB' : Math.round(b / 1024).toLocaleString() + ' KiB';
}

var map = L.map('map', { worldCopyJump: true, preferCanvas: true }).setView([25, 5], 2);
var streets = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 20, subdomains: 'abcd', attribution: '© OpenStreetMap © CARTO' }).addTo(map);
var sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19, attribution: 'Tiles © Esri' });
var dark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20, subdomains: 'abcd', attribution: '© OpenStreetMap © CARTO' });
L.control.layers({ 'Streets': streets, 'Satellite': sat, 'Dark': dark }, {}, { position: 'bottomright' }).addTo(map);
L.control.scale({ position: 'bottomleft', metric: true, imperial: true, maxWidth: 180 }).addTo(map);

// flat copies shipped to each worker once (structured clone = fast memcpy)
var NARCS = ARCS.length;
var OFFS = new Uint32Array(NARCS + 1);
for (var a = 0; a < NARCS; a++) OFFS[a + 1] = OFFS[a] + ARCS[a].length;
var COORDS = new Float64Array(OFFS[NARCS] * 2);
for (var a2 = 0, w2 = 0; a2 < NARCS; a2++)
  for (var i2 = 0; i2 < ARCS[a2].length; i2++) { COORDS[w2++] = ARCS[a2][i2][0]; COORDS[w2++] = ARCS[a2][i2][1]; }
var WASM_BYTES = (function () {
  var bin = atob(WASM_B64), u = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) u[i] = bin.charCodeAt(i);
  return u;
})();
var DENSF = DENS ? new Float64Array(DENS) : null;
var HEATV = HEAT ? (function () {
  var bin = atob(HEAT.b64), u = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) u[i] = bin.charCodeAt(i);
  return u;
})() : null;

// worker: instantiate utz-simplify WASM, simplify every arc on request, and
// price the misassignment (pocket decomposition between each raw sub-chain
// and its shortcut — subset simplifiers make output verts bit-exact copies,
// so they map back to raw indices; density from the embedded heat raster).
// Killed and respawned to abort — never blocks the page.
function workerBody() {
  var W = null, buf = 0, dbuf = 0, COORDS = null, OFFS = null, DENS = null;
  // pockets between raw sub-chain [i0..i1] (indices within arc at base s)
  // and its shortcut; splits at chain/shortcut-line crossings. People are
  // priced with the mean per-vertex density over the pocket's chain — DENS
  // hugs the boundary exactly where pockets live.
  function pockets(s, i0, i1, acc) {
    var X = function (i) { return COORDS[(s + i) * 2]; };
    var Y = function (i) { return COORDS[(s + i) * 2 + 1]; };
    var D = function (i) { return DENS ? DENS[s + i] : 0; };
    var ax = X(i0), ay = Y(i0), dx = X(i1) - ax, dy = Y(i1) - ay;
    var len2 = dx * dx + dy * dy;
    var pocket = 0, clat = ay, dsum = D(i0), np = 1;
    var flush = function () {
      var km2 = Math.abs(pocket) * 111.32 * 111.32 * Math.cos(clat / np * Math.PI / 180);
      acc.area += km2;
      acc.people += km2 * dsum / np;
    };
    var px = ax, py = ay, sp = 0;
    for (var k = i0; k < i1; k++) {
      var qx = X(k + 1), qy = Y(k + 1);
      var sq = dx * (qy - ay) - dy * (qx - ax);
      if (len2 > 0 && sp * sq < 0) {
        var t = sp / (sp - sq);
        var xx = px + t * (qx - px), xy = py + t * (qy - py);
        pocket += ((px - ax) * (xy - ay) - (py - ay) * (xx - ax)) / 2;
        flush();
        pocket = ((xx - ax) * (qy - ay) - (xy - ay) * (qx - ax)) / 2;
        clat = xy + qy; dsum = D(k) + D(k + 1); np = 2;
      } else {
        pocket += ((px - ax) * (qy - ay) - (py - ay) * (qx - ax)) / 2;
        clat += qy; dsum += D(k + 1); np++;
      }
      px = qx; py = qy; sp = sq;
    }
    flush();
  }
  onmessage = function (e) {
    var m = e.data;
    if (m.type === 'init') {
      COORDS = m.coords; OFFS = m.offs; DENS = m.dens;
      var maxLen = 0;
      for (var a = 0; a + 1 < OFFS.length; a++) maxLen = Math.max(maxLen, OFFS[a + 1] - OFFS[a]);
      WebAssembly.instantiate(m.wasm, {}).then(function (r) {
        W = r.instance.exports;
        buf = W.utz_alloc(maxLen * 2);
        if (DENS) dbuf = W.utz_alloc(maxLen);
        postMessage({ type: 'ready' });
      });
    } else if (m.type === 'run') {
      var t0 = Date.now();
      var out = new Float64Array(COORDS.length);
      var outOffs = new Uint32Array(OFFS.length);
      var kept = 0;
      var weighted = DENS && m.wmin < 1;
      var acc = { area: 0, people: 0 };
      for (var a = 0; a + 1 < OFFS.length; a++) {
        var s = OFFS[a], n = OFFS[a + 1] - s;
        var f = new Float64Array(W.memory.buffer, buf, n * 2);
        f.set(COORDS.subarray(s * 2, (s + n) * 2));
        var k;
        if (weighted) {
          new Float64Array(W.memory.buffer, dbuf, n).set(DENS.subarray(s, s + n));
          k = W.utz_simplify_w(m.algoId, buf, n, m.param, dbuf, m.wmin);
        } else {
          k = W.utz_simplify(m.algoId, buf, n, m.param);
        }
        var res = new Float64Array(W.memory.buffer, buf, k * 2);
        out.set(res, kept * 2);
        if (k < n) {
          // walk-match kept verts to raw indices, then price each shortcut
          var j = 0, prev = -1;
          for (var v = 0; v < k; v++) {
            while (COORDS[(s + j) * 2] !== res[v * 2] || COORDS[(s + j) * 2 + 1] !== res[v * 2 + 1]) j++;
            if (prev >= 0 && j > prev + 1) pockets(s, prev, j, acc);
            prev = j; j++;
          }
        }
        kept += k; outOffs[a + 1] = kept;
      }
      var coords = out.slice(0, kept * 2);
      postMessage({ type: 'done', gen: m.gen, kept: kept, ms: Date.now() - t0, coords: coords, offs: outOffs, area: acc.area, people: acc.people },
        [coords.buffer, outOffs.buffer]);
    }
  };
}
var WORKER_URL = URL.createObjectURL(new Blob(['(' + workerBody.toString() + ')()'], { type: 'text/javascript' }));

function Slot(idx, color, def) {
  var self = this;
  this.idx = idx; this.color = color;
  this.on = def.on; this.algo = def.algo; this.eps = def.eps; this.quant = def.quant;
  this.pwv = def.pwv || 0; // pop-weight slider position, 0 = off
  this.gen = 0; this.busy = false; this.ready = false; this.pendingRun = false;
  this.worker = null; this.result = null;
  this.layer = L.polyline([], { color: color, weight: 1.2, opacity: 0.95 });

  var row = document.createElement('div'); row.className = 'slot';
  this.cb = document.createElement('input'); this.cb.type = 'checkbox'; this.cb.checked = this.on;
  var sw = document.createElement('span'); sw.className = 'sw'; sw.style.background = color;
  this.selAlgo = mkSelect(ALGO.map(function (a) { return a.name; }), this.algo);
  this.selEps = mkSelect(
    EPS_M.map(function (e) { return 'ε ' + e + ' m'; }).concat(['ε custom…']),
    EPS_M.indexOf(this.eps));
  this.selQuant = mkSelect(QUANT.map(function (q) { return q.label; }), this.quant);
  this.spin = document.createElement('span'); this.spin.className = 'spin';
  row.appendChild(this.cb); row.appendChild(sw);
  row.appendChild(this.selAlgo); row.appendChild(this.selEps); row.appendChild(this.selQuant);
  row.appendChild(this.spin);
  document.getElementById('slots').appendChild(row);

  // custom-ε sub-row: log slider 1 m … 10 km, shown while 'ε custom…' is picked
  this.epsRow = document.createElement('div');
  this.epsRow.className = 'slot'; this.epsRow.style.display = 'none';
  var elbl = document.createElement('span'); elbl.className = 'raw-label'; elbl.style.color = '#8b98a8';
  elbl.textContent = 'custom ε';
  this.epsSl = document.createElement('input');
  this.epsSl.type = 'range'; this.epsSl.min = 0; this.epsSl.max = 100; this.epsSl.style.flex = '1';
  this.epsV = document.createElement('span'); this.epsV.className = 'rawv';
  this.epsRow.appendChild(elbl); this.epsRow.appendChild(this.epsSl); this.epsRow.appendChild(this.epsV);
  document.getElementById('slots').appendChild(this.epsRow);
  var slEps = function () { return Math.round(Math.pow(10, self.epsSl.value / 25)); };

  // pop-weight sub-row: log slider, off (×1) … ×0.01; recompute on release
  if (DENS) {
    this.popRow = document.createElement('div'); this.popRow.className = 'slot';
    this.popRow.title = 'population weighting: ε shrinks toward ε × this factor in the densest areas (GHS-POP); far left = off';
    var psw = document.createElement('span'); psw.className = 'sw'; psw.style.background = color;
    psw.style.opacity = '0.45';
    var plbl = document.createElement('span'); plbl.className = 'raw-label'; plbl.style.color = '#8b98a8';
    plbl.textContent = 'pop weight';
    this.popSl = document.createElement('input');
    this.popSl.type = 'range'; this.popSl.min = 0; this.popSl.max = 100;
    this.popSl.value = this.pwv; this.popSl.style.flex = '1';
    this.popV = document.createElement('span'); this.popV.className = 'rawv';
    this.popRow.appendChild(psw); this.popRow.appendChild(plbl);
    this.popRow.appendChild(this.popSl); this.popRow.appendChild(this.popV);
    document.getElementById('slots').appendChild(this.popRow);
    var syncPop = function () { self.popV.textContent = self.pwv > 0 ? self.popLabel() : 'off'; };
    this.popSl.addEventListener('input', function () { self.pwv = +self.popSl.value; syncPop(); });
    this.popSl.addEventListener('change', function () { self.request(); });
    syncPop();
  }

  this.cb.addEventListener('change', function () { self.on = self.cb.checked; self.toggled(); });
  this.selAlgo.addEventListener('change', function () { self.algo = self.selAlgo.selectedIndex; self.syncDisabled(); self.request(); });
  this.selEps.addEventListener('change', function () {
    if (self.selEps.selectedIndex < EPS_M.length) {
      self.eps = EPS_M[self.selEps.selectedIndex];
      self.epsRow.style.display = 'none';
    } else {
      self.epsSl.value = Math.round(25 * Math.log10(Math.max(1, self.eps))); // seed from current ε
      self.eps = slEps();
      self.epsV.textContent = 'ε ' + self.eps + ' m';
      self.epsRow.style.display = '';
    }
    self.request();
  });
  this.epsSl.addEventListener('input', function () { self.epsV.textContent = 'ε ' + slEps() + ' m'; });
  this.epsSl.addEventListener('change', function () { self.eps = slEps(); self.request(); });
  this.selQuant.addEventListener('change', function () {
    // quantization only snaps the already-simplified result for display
    self.quant = self.selQuant.selectedIndex;
    self.redraw(); updateStats();
  });
  this.syncDisabled();
}
function mkSelect(labels, sel) {
  var s = document.createElement('select');
  labels.forEach(function (l) { var o = document.createElement('option'); o.textContent = l; s.appendChild(o); });
  s.selectedIndex = sel;
  return s;
}
// ε multiplier at max density from the slider position (log: 0 → ×1 … 100 → ×0.01)
Slot.prototype.wmin = function () { return this.pwv > 0 ? Math.pow(10, -this.pwv / 50) : 1; };
Slot.prototype.popLabel = function () {
  var w = this.wmin();
  return '×' + (w < 0.1 ? w.toFixed(3) : w.toFixed(2));
};
Slot.prototype.syncDisabled = function () {
  var d = !this.on;
  var raw = ALGO[this.algo].key === 'raw'; // no ε — quant only
  this.selAlgo.disabled = d;
  this.selEps.disabled = d || raw;
  this.epsSl.disabled = d || raw;
  this.selQuant.disabled = d;
  if (this.popSl) this.popSl.disabled = d || raw;
};
Slot.prototype.toggled = function () {
  this.syncDisabled();
  if (this.on) {
    this.layer.addTo(map);
    if (this.result) { this.redraw(); updateStats(); } else { this.request(); }
  } else {
    map.removeLayer(this.layer);
    if (this.busy) { this.abort(); }
    updateStats();
  }
};
Slot.prototype.spawn = function () {
  var self = this;
  this.ready = false;
  this.worker = new Worker(WORKER_URL);
  this.worker.onmessage = function (e) {
    var m = e.data;
    if (m.type === 'ready') {
      self.ready = true;
      if (self.pendingRun) { self.pendingRun = false; self.send(); }
    } else if (m.type === 'done' && m.gen === self.gen) {
      self.busy = false; self.spin.classList.remove('on');
      self.result = m;
      self.redraw(); updateStats();
    }
  };
  this.worker.postMessage({ type: 'init', wasm: WASM_BYTES, coords: COORDS, offs: OFFS, dens: DENSF });
};
Slot.prototype.abort = function () {
  if (this.worker) { this.worker.terminate(); this.worker = null; }
  this.busy = false; this.pendingRun = false; this.spin.classList.remove('on');
};
Slot.prototype.send = function () {
  var epsDeg = this.eps / 111320;
  this.worker.postMessage({
    type: 'run', gen: this.gen,
    algoId: ALGO[this.algo].id,
    param: ALGO[this.algo].key === 'vw' ? epsDeg * epsDeg : epsDeg,
    wmin: DENS ? this.wmin() : 1,
  });
};
Slot.prototype.request = function () {
  if (!this.on) return;
  this.gen++;
  if (this.busy) this.abort(); // abort mid-compute, start fresh
  this.busy = true; this.spin.classList.add('on');
  if (!this.worker) this.spawn();
  if (this.ready) { this.send(); } else { this.pendingRun = true; }
};
Slot.prototype.redraw = function () {
  if (!this.result || !this.on) return;
  var m = QUANT[this.quant].key;
  var lls = [], c = this.result.coords, o = this.result.offs;
  for (var a = 0; a + 1 < o.length; a++) {
    var seg = new Array(o[a + 1] - o[a]);
    for (var i = o[a]; i < o[a + 1]; i++) seg[i - o[a]] = [qc(c[i * 2 + 1], m, 90), qc(c[i * 2], m, 180)];
    lls.push(seg);
  }
  this.layer.setLatLngs(lls);
};

var slots = [
  new Slot(0, '#ff2d78', { on: true, algo: 0, eps: 500, quant: 0 }),
  new Slot(1, '#00c8ff', { on: false, algo: 2, eps: 500, quant: 0 }),
  new Slot(2, '#ffd400', { on: false, algo: 1, eps: 500, quant: 0 }),
];

// raw f64 overlay — built lazily on first enable (drawing 2M verts is slow)
var rawLayer = null;
var rawCb = document.getElementById('rawcb');
document.getElementById('rawv').textContent = STORED0.toLocaleString() + ' v';
function syncRaw() {
  if (rawCb.checked) {
    if (!rawLayer) {
      var lls = ARCS.map(function (arc) { return arc.map(function (p) { return [p[1], p[0]]; }); });
      rawLayer = L.polyline(lls, { color: '#00d95f', weight: 1, opacity: 0.8 });
    }
    rawLayer.addTo(map);
  } else if (rawLayer) {
    map.removeLayer(rawLayer);
  }
  updateStats();
}
rawCb.addEventListener('change', syncRaw);

// ---- population density: heatmap layer + global weighting strength ----
if (DENS) {
  document.getElementById('densec').style.display = '';
  // heat sits above tiles, below the vector canvas
  map.createPane('heat').style.zIndex = 350;
  var heatLayer = null;
  var heatCb = document.getElementById('heatcb'), heatOp = document.getElementById('heatop');
  var mercY = function (lat) { return Math.log(Math.tan(Math.PI / 4 + lat * Math.PI / 360)); };
  function buildHeat() {
    var v = HEATV;
    // the raster is equirectangular; Leaflet stretches an imageOverlay
    // linearly in *Mercator* y — resample rows so latitudes land right
    var latTop = Math.min(HEAT.lat0, 85.05), latBot = Math.max(HEAT.lat0 - HEAT.h * HEAT.dlat, -85.05);
    var Wp = HEAT.w, Hp = 1024;
    var cv = document.createElement('canvas'); cv.width = Wp; cv.height = Hp;
    var ctx = cv.getContext('2d'), img = ctx.createImageData(Wp, Hp);
    var yT = mercY(latTop), yB = mercY(latBot);
    for (var r = 0; r < Hp; r++) {
      var lat = (2 * Math.atan(Math.exp(yT + (yB - yT) * (r + 0.5) / Hp)) - Math.PI / 2) * 180 / Math.PI;
      var sr = Math.floor((HEAT.lat0 - lat) / HEAT.dlat);
      if (sr < 0 || sr >= HEAT.h) continue;
      for (var c = 0; c < Wp; c++) {
        var d = v[sr * Wp + c];
        if (!d) continue;   // unpopulated → fully transparent
        var t = d / 255, o = (r * Wp + c) * 4;
        var s = t < 0.5 ? [[13, 60, 120], [245, 200, 30]] : [[245, 200, 30], [255, 45, 45]];
        var u = t < 0.5 ? t * 2 : t * 2 - 1;
        img.data[o] = s[0][0] + (s[1][0] - s[0][0]) * u;
        img.data[o + 1] = s[0][1] + (s[1][1] - s[0][1]) * u;
        img.data[o + 2] = s[0][2] + (s[1][2] - s[0][2]) * u;
        img.data[o + 3] = 70 + 185 * t;
      }
    }
    ctx.putImageData(img, 0, 0);
    return L.imageOverlay(cv.toDataURL('image/png'),
      [[latBot, HEAT.lon0], [latTop, HEAT.lon0 + HEAT.w * HEAT.dlon]],
      { pane: 'heat', opacity: heatOp.value / 100, interactive: false });
  }
  heatCb.addEventListener('change', function () {
    if (heatCb.checked) {
      if (!heatLayer) heatLayer = buildHeat();
      heatLayer.setOpacity(heatOp.value / 100);
      heatLayer.addTo(map);
    } else if (heatLayer) { map.removeLayer(heatLayer); }
  });
  heatOp.addEventListener('input', function () { if (heatLayer) heatLayer.setOpacity(heatOp.value / 100); });
  if (heatCb.checked) heatCb.dispatchEvent(new Event('change')); // restored state
}

function updateStats() {
  var el = document.getElementById('stats');
  el.innerHTML = '';
  var shown = 0;
  if (document.getElementById('rawcb').checked) {
    shown++;
    el.innerHTML += '<div class="st"><span class="sw" style="background:#00d95f"></span><span>raw f64</span>' +
      '<span class="num">' + STORED0.toLocaleString() + ' v · ' + fmtBytes(STORED0 * 16) + '</span></div>';
  }
  slots.forEach(function (s) {
    if (!s.on || !s.result) return;
    shown++;
    var q = QUANT[s.quant];
    var kept = s.result.kept;
    var isRaw = ALGO[s.algo].key === 'raw';
    el.innerHTML += '<div class="st"><span class="sw" style="background:' + s.color + '"></span>' +
      '<span>' + ALGO[s.algo].name + (isRaw ? '' : ' ε' + s.eps) + ' @ ' + q.label +
      (s.pwv > 0 && !isRaw ? ' pop' + s.popLabel() : '') + '</span>' +
      '<span class="num">' + kept.toLocaleString() + ' v · <span class="pct">−' +
      (100 * (1 - kept / STORED0)).toFixed(1) + '%</span> · ' + fmtBytes(kept * 2 * q.bpc) +
      ' · ' + s.result.ms.toLocaleString() + ' ms</span></div>';
  });
  if (!shown) el.innerHTML = '<div class="st" style="color:#5a6472">nothing enabled</div>';

  // misassignment vs raw: pocket area, and people when the raster is embedded
  var ms = document.getElementById('mstats');
  ms.innerHTML = '';
  var mshown = 0;
  slots.forEach(function (s) {
    if (!s.on || !s.result || ALGO[s.algo].key === 'raw') return;
    mshown++;
    ms.innerHTML += '<div class="st"><span class="sw" style="background:' + s.color + '"></span>' +
      '<span>' + ALGO[s.algo].name + ' ε' + s.eps + (s.pwv > 0 ? ' pop' + s.popLabel() : '') + '</span>' +
      '<span class="num">' + Math.round(s.result.area).toLocaleString() + ' km²' +
      (DENS ? ' · <span class="pct">' + Math.round(s.result.people).toLocaleString() + ' people</span>' : '') +
      '</span></div>';
  });
  if (!mshown) ms.innerHTML = '<div class="st" style="color:#5a6472">no simplified sets enabled</div>';
}

slots.forEach(function (s) { if (s.on) { s.layer.addTo(map); s.request(); } });
// browsers restore the static checkbox's state across reloads without firing
// `change` — honor whatever it says at load
if (rawCb.checked) { syncRaw(); } else { updateStats(); }
</script>
</body>
</html>

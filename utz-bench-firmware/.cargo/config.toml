[build]
target = "xtensa-esp32s3-none-elf"

[target.xtensa-esp32s3-none-elf]
# writes the utzdata partition (partitions.csv via espflash.toml) before
# espflash flash --monitor
runner = "./flash-with-data.sh"
rustflags = ["-C", "link-arg=-Tlinkall.x"]

[unstable]
build-std = ["core", "alloc"]

[env]
ESP_LOG = "info"
